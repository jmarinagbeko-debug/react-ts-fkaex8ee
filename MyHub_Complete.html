<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>My Hub — ADHD Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --mocha:#5C3D2E;--brown:#7A5C3E;--brownLt:#A07850;
  --sage:#8BAF8D;--sageDk:#6A8F6C;--sand:#D9CCBA;
  --beige:#EDE5D4;--cream:#F5F0E8;--warm:#E8DFD0;
  --white:#FDFAF5;--accent:#C9A87C;--muted:#9E8E7A;
  --text:#3D2E1E;--textLt:#6B5A48;
  --event:#A8C5C8;--errand:#D4A76A;--chore:#8BAF8D;
  --task:#C9A87C;--appt:#9090C8;--remind:#C47A6A;
}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--sand);border-radius:2px;}
input,textarea,select{font-family:'Nunito',sans-serif;}
input[type=checkbox]{accent-color:var(--sage);width:17px;height:17px;cursor:pointer;flex-shrink:0;}
input[type=range]{accent-color:var(--sage);width:100%;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.slide-up{animation:slideUp .25s ease;}
.fade-in{animation:fadeIn .2s ease;}

/* Layout */
.card{background:var(--white);border-radius:16px;padding:16px;border:1px solid var(--beige);box-shadow:0 2px 12px rgba(90,60,30,.07);}
.card-beige{background:var(--beige);border-radius:12px;padding:12px;border:1px solid var(--sand);}
.sec-title{font-size:11px;font-weight:800;letter-spacing:1.1px;color:var(--brownLt);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.sec-title-left{display:flex;align-items:center;gap:6px;}

/* Form */
.inp{border:1.5px solid var(--sand);border-radius:10px;padding:10px 14px;font-size:15px;background:var(--white);color:var(--text);outline:none;width:100%;transition:border .15s;}
.inp:focus{border-color:var(--sage);}
.inp-sm{font-size:13px;padding:7px 10px;border-radius:8px;}
.sel{border:1.5px solid var(--sand);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--white);color:var(--text);outline:none;width:100%;cursor:pointer;}
textarea.inp{resize:vertical;line-height:1.5;min-height:80px;}

/* Buttons */
.btn{border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-sage{background:var(--sage);color:#fff;} .btn-sage:active{background:var(--sageDk);}
.btn-brown{background:var(--brown);color:#fff;}
.btn-muted{background:var(--sand);color:var(--textLt);}
.btn-red{background:var(--remind);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-icon{width:38px;height:38px;padding:0;border-radius:10px;font-size:16px;}

/* Check rows */
.check-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--beige);}
.check-row:last-child{border-bottom:none;}
.check-row label{font-size:14px;color:var(--textLt);cursor:pointer;flex:1;line-height:1.4;padding-top:1px;}
.check-row.done label{text-decoration:line-through;opacity:.4;}

/* Tags */
.tag{border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;display:inline-block;}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--mocha);display:flex;align-items:center;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.2);z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 10px;border-radius:10px;cursor:pointer;border:none;background:transparent;font-family:'Nunito',sans-serif;min-width:50px;}
.nav-item .ni{font-size:19px;line-height:1;}
.nav-item .nl{font-size:9px;font-weight:800;letter-spacing:.4px;color:var(--sand);text-transform:uppercase;}
.nav-item.active{background:rgba(255,255,255,.15);}
.nav-item.active .nl{color:#fff;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.sheet{background:var(--white);border-radius:24px 24px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:640px;max-height:88vh;overflow-y:auto;animation:slideUp .25s ease;}
.handle{width:38px;height:4px;background:var(--sand);border-radius:2px;margin:0 auto 18px;}

/* Time block */
.trow{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px dashed var(--beige);min-height:32px;}
.trow:last-child{border-bottom:none;}
.tlbl{color:var(--muted);width:50px;flex-shrink:0;font-size:11px;font-weight:700;padding-top:3px;}

/* Progress */
.prog{height:7px;background:var(--beige);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:var(--sage);border-radius:4px;transition:width .4s;}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--beige);color:var(--brownLt);font-weight:800;font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:8px 6px;text-align:left;}
td{padding:7px 6px;border-bottom:1px solid var(--beige);color:var(--textLt);vertical-align:top;}
td input{border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text);outline:none;width:100%;padding:2px 0;border-bottom:1px dashed var(--sand);}
tr:last-child td{border-bottom:none;}

/* Responsive */
@media(min-width:600px){
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
}

.assign-badge{background:var(--accent);color:var(--white);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800;}
.assign-peter{background:var(--appt);}
.assign-both{background:var(--sage);}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ── Constants ──────────────────────────────────────────────────────────
const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const HOURS  = Array.from({length:17},(_,i)=>i+6); // 6am-10pm
const ENERGY_RULES = {
  "Low Energy":    "🛌 Rest mode: 1 essential task only. Delegate the rest.",
  "Medium Energy": "⚡ Focused: Main priority + 1 medium. 25 min on / 5 min off.",
  "High Energy":   "🔋 Power mode: Hit all priorities! Deep work first.",
  "Post-Call":     "💤 Recovery: Bare minimum. Hydrate, eat, rest.",
  "On Call":       "📟 Alert: Interruptible tasks only. Keep it loose.",
};
const QUOTES = [
  "You don't have to be perfect to make progress.",
  "Done is better than perfect.",
  "One thing at a time. One day at a time.",
  "Progress, not perfection.",
  "Small steps every day add up.",
  "You are doing better than you think.",
  "Rest is productive.",
  "Be where your feet are.",
];
const DEFAULT_CATS = ["Event","Appointment","Errand","Chore","Task","Reminder","Schedule","Meal"];
const CAT_COLORS   = {
  Event:"#A8C5C8",Appointment:"#9090C8",Errand:"#D4A76A",
  Chore:"#8BAF8D",Task:"#C9A87C",Reminder:"#C47A6A",
  Schedule:"#8BAF8D",Meal:"#C49060",
};
const TAG_COLORS = {
  Personal:"#A07850",Work:"#8BAF8D",Kids:"#A8C5C8",
  Family:"#D4A76A",Couple:"#C47A6A",Home:"#9090C8",Other:"#9E8E7A",
};

// ── Helpers ────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const mkKey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const todayObj = () => { const d=new Date(); return {y:d.getFullYear(),m:d.getMonth(),d:d.getDate(),dow:d.getDay()}; };
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const firstDow = (y,m) => new Date(y,m,1).getDay();
const fmt12 = h => h===0?"12 AM":h<12?`${h} AM`:h===12?"12 PM":`${h-12} PM`;
const T = todayObj();
const TK = mkKey(T.y,T.m,T.d);
const weekDates = dt => {
  const d=new Date(dt.y,dt.m,dt.d); d.setDate(d.getDate()-d.getDay());
  return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return{y:x.getFullYear(),m:x.getMonth(),d:x.getDate(),dow:i};});
};
const getHour = timeStr => {
  if(!timeStr) return null;
  const m=timeStr.match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);
  if(!m) return null;
  let hr=parseInt(m[1]);
  if(m[3].toUpperCase()==="PM"&&hr!==12)hr+=12;
  if(m[3].toUpperCase()==="AM"&&hr===12)hr=0;
  return hr;
};

// ── Seed data ──────────────────────────────────────────────────────────
const SEED = {
  events: {
    [TK]: [
      {id:1,date:TK,title:"School Pickup",timeStart:"4:00 PM",timeEnd:"4:30 PM",type:"Event",tag:"Kids",assignTo:"Jocelyne",done:false,note:"",link:""},
      {id:2,date:TK,title:"Grocery store",timeStart:"",timeEnd:"",type:"Errand",tag:"Home",assignTo:"Peter",done:false,note:"Whole Foods list",link:""},
      {id:3,date:TK,title:"Load of laundry",timeStart:"",timeEnd:"",type:"Chore",tag:"Home",assignTo:"Both",done:false,note:"",link:""},
      {id:4,date:TK,title:"Update planner",timeStart:"9:00 AM",timeEnd:"10:00 AM",type:"Task",tag:"Work",assignTo:"Jocelyne",done:false,note:"",link:""},
    ]
  },
  meals: {
    [TK]: {
      breakfast:"Greek yogurt + berries",
      lunch:"Beef bowl",
      dinner:"Taco night 🌮",
      snack:"Cheese + crackers",
      kidsBreakfast:"Pancakes",
      kidsLunch:"Turkey wrap",
      kidsDinner:"Mac & cheese",
      opt2:"Quesadillas + salad",
      opt3:"Sheet pan chicken",
    }
  },
  pris: {
    [TK]: {main:"Finish ADHD Hub",medium:["Workout","Grocery order"],small:["Reply emails","Declutter desk","Call Mom"]}
  },
  settings: {
    energy:"Medium Energy",mood:"😊 Great",
    brain_dump:"",intention:"I will focus on progress, not perfection.",
    theme:"Momentum Monday",weekly_theme:"Launch Week",weekly_focus:"Ship it",
    weekly_goals:["Finish Hub","4 Workouts","Meal prep"],
    weekly_progress:{Work:70,Health:50,Home:60,Personal:80,Family:75},
    reminders:["Pack school lunches","Prep dinner","Check freezer"],
    categories:[...DEFAULT_CATS],
  },
  kidsLunch: {
    [TK]: [
      {name:"Yayra",main:"Turkey wrap",fruit:"Berries",snack:"Cheese stick",drink:"Water",note:""},
      {name:"Seysey",main:"Pasta salad",fruit:"Grapes",snack:"Crackers",drink:"Water",note:""},
    ]
  },
  mealIdeas: [
    {id:1,name:"Burrito bowls",cat:"Dinner",prep:"15 min",tags:"Quick,Family"},
    {id:2,name:"Quesadillas",cat:"Dinner",prep:"15 min",tags:"Quick,Kids"},
    {id:3,name:"Sheet pan chicken",cat:"Dinner",prep:"25 min",tags:"Healthy"},
    {id:4,name:"Greek yogurt + berries",cat:"Breakfast",prep:"5 min",tags:"Quick"},
    {id:5,name:"Turkey wraps",cat:"Lunch",prep:"10 min",tags:"Kids"},
    {id:6,name:"Pasta salad",cat:"Lunch",prep:"15 min",tags:"Kids"},
    {id:7,name:"Overnight oats",cat:"Breakfast",prep:"5 min",tags:"Prep ahead"},
    {id:8,name:"Tacos",cat:"Dinner",prep:"20 min",tags:"Family,Kids"},
  ],
  monthNotes: {},
  library: [
    {id:1,title:"School Pickup",type:"Event",tag:"Kids",assignTo:"Jocelyne",timeStart:"4:00 PM",timeEnd:"4:30 PM",note:"",link:""},
    {id:2,title:"Grocery Store",type:"Errand",tag:"Home",assignTo:"Peter",timeStart:"",timeEnd:"",note:"",link:""},
    {id:3,title:"Doctor Appointment",type:"Appointment",tag:"Personal",assignTo:"Jocelyne",timeStart:"",timeEnd:"",note:"",link:""},
    {id:4,title:"Load of Laundry",type:"Chore",tag:"Home",assignTo:"Both",timeStart:"",timeEnd:"",note:"",link:""},
    {id:5,title:"Dishwasher",type:"Chore",tag:"Home",assignTo:"Both",timeStart:"",timeEnd:"",note:"",link:""},
    {id:6,title:"Vacuum Living Room",type:"Chore",tag:"Home",assignTo:"Both",timeStart:"",timeEnd:"",note:"",link:""},
    {id:7,title:"Meal Prep",type:"Task",tag:"Home",assignTo:"Jocelyne",timeStart:"",timeEnd:"",note:"",link:""},
    {id:8,title:"Pay Bills",type:"Task",tag:"Personal",assignTo:"Jocelyne",timeStart:"",timeEnd:"",note:"",link:""},
    {id:9,title:"Kids Bath Night",type:"Chore",tag:"Kids",assignTo:"Both",timeStart:"7:00 PM",timeEnd:"7:30 PM",note:"",link:""},
    {id:10,title:"Return Amazon Package",type:"Errand",tag:"Personal",assignTo:"Peter",timeStart:"",timeEnd:"",note:"",link:""},
    {id:11,title:"Call Mom",type:"Task",tag:"Family",assignTo:"Jocelyne",timeStart:"",timeEnd:"",note:"",link:""},
    {id:12,title:"Date Night",type:"Event",tag:"Couple",assignTo:"Both",timeStart:"7:00 PM",timeEnd:"",note:"",link:""},
  ],
  recurring: [
    {id:1,title:"Morning Routine",type:"Schedule",tag:"Personal",assignTo:"Jocelyne",timeStart:"6:00 AM",timeEnd:"7:00 AM",freq:"Daily",dow:[],dom:0,note:"",link:"",active:true},
    {id:2,title:"Evening Routine",type:"Schedule",tag:"Personal",assignTo:"Both",timeStart:"8:00 PM",timeEnd:"9:00 PM",freq:"Daily",dow:[],dom:0,note:"",link:"",active:true},
    {id:3,title:"Grocery Run",type:"Errand",tag:"Home",assignTo:"Peter",timeStart:"",timeEnd:"",freq:"Weekly",dow:[6],dom:0,note:"",link:"",active:true},
    {id:4,title:"Family Clean Up",type:"Chore",tag:"Family",assignTo:"Both",timeStart:"10:00 AM",timeEnd:"11:00 AM",freq:"Weekly",dow:[0],dom:0,note:"",link:"",active:true},
  ],
};

// ── Shared Components ──────────────────────────────────────────────────
const TagBadge = ({tag}) => {
  const c = TAG_COLORS[tag]||"#9E8E7A";
  return <span className="tag" style={{background:c+"22",color:c}}>{tag}</span>;
};
const AssignBadge = ({who}) => {
  const c = who==="Peter"?"#9090C8":who==="Both"?"#8BAF8D":"#A07850";
  return <span className="tag" style={{background:c+"22",color:c,fontSize:10}}>👤 {who}</span>;
};
const DotIcon = ({type,cats}) => {
  const c = (cats&&cats[type])||CAT_COLORS[type]||"#9E8E7A";
  return <span className="dot" style={{background:c}}/>;
};
const SecTitle = ({icon,children,right}) => (
  <div className="sec-title">
    <span className="sec-title-left">{icon&&<span>{icon}</span>}{children}</span>
    {right&&<span>{right}</span>}
  </div>
);
const ProgBar = ({value}) => (
  <div className="prog"><div className="prog-fill" style={{width:`${Math.min(100,value||0)}%`}}/></div>
);
const CheckItem = ({label,done,onChange,tag,time,assignTo,onDelete}) => (
  <div className={`check-row${done?" done":""}`}>
    <input type="checkbox" checked={!!done} onChange={onChange}/>
    <label onClick={onChange} style={{cursor:"pointer"}}>
      {time&&<span style={{color:"var(--muted)",fontSize:12,marginRight:4}}>{time}</span>}
      {label}
      {tag&&<span style={{marginLeft:5}}><TagBadge tag={tag}/></span>}
      {assignTo&&<span style={{marginLeft:5}}><AssignBadge who={assignTo}/></span>}
    </label>
    {onDelete&&<button onClick={onDelete} style={{border:"none",background:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",padding:"0 3px"}}>×</button>}
  </div>
);
const Sheet = ({title,onClose,children}) => (
  <div className="overlay fade-in" onClick={onClose}>
    <div className="sheet" onClick={e=>e.stopPropagation()}>
      <div className="handle"/>
      {title&&<div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"var(--brown)",marginBottom:16}}>{title}</div>}
      {children}
    </div>
  </div>
);

// ═══════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [view,setView]     = useState("hub");
  const [cur,setCur]       = useState(todayObj());
  const [events,setEvents] = useState(SEED.events);
  const [meals,setMeals]   = useState(SEED.meals);
  const [pris,setPris]     = useState(SEED.pris);
  const [set,setSet]       = useState(SEED.settings);
  const [kidsLunch,setKidsLunch] = useState(SEED.kidsLunch);
  const [mealIdeas,setMealIdeas] = useState(SEED.mealIdeas);
  const [library,setLibrary] = useState(SEED.library);
  const [recurring,setRecurring] = useState(SEED.recurring);
  const [showLibrary,setShowLibrary] = useState(false);
  const [monthNotes,setMonthNotes] = useState(SEED.monthNotes);
  const [addSheet,setAddSheet]   = useState(false);
  const [editEvent,setEditEvent] = useState(null);
  const [newItem,setNewItem]     = useState({title:"",timeStart:"",timeEnd:"",type:"Task",tag:"Personal",assignTo:"Jocelyne",note:"",link:""});

  const dk = mkKey(cur.y,cur.m,cur.d);
  const storedEvs = events[dk]||[];
  const recurringToday = getRecurringForDate(recurring, cur).filter(r => !storedEvs.some(e => e.title===r.title && e.isRecurring));
  const dayEvs = [...storedEvs, ...recurringToday.map(r=>({...r,id:"r"+r.id,done:false,date:dk,isRecurring:true}))];
  const dayMls  = meals[dk]||{};
  const dayPri  = pris[dk]||{main:"",medium:["",""],small:["","",""]};
  const dayKids = kidsLunch[dk]||SEED.kidsLunch[TK];
  const wkDays  = weekDates(cur);
  const quote   = QUOTES[(cur.d+cur.m)%QUOTES.length];
  const cats    = set.categories||DEFAULT_CATS;

  const syncSet = (k,v) => setSet(s=>({...s,[k]:v}));
  const syncPri = (f,v) => setPris(p=>({...p,[dk]:{...dayPri,[f]:v}}));
  const syncMeal = (f,v) => setMeals(m=>({...m,[dk]:{...dayMls,[f]:v}}));
  const toggleEv = (key,id) => setEvents(es=>({...es,[key]:(es[key]||[]).map(e=>e.id===id?{...e,done:!e.done}:e)}));
  const delEv    = (key,id) => setEvents(es=>({...es,[key]:(es[key]||[]).filter(e=>e.id!==id)}));
  const addEv = () => {
    if(!newItem.title.trim())return;
    setEvents(es=>({...es,[dk]:[...(es[dk]||[]),{...newItem,id:Date.now(),done:false,date:dk}]}));
    setNewItem({title:"",timeStart:"",timeEnd:"",type:"Task",tag:"Personal",assignTo:"Jocelyne",note:"",link:""});
    setAddSheet(false);
  };

  const TABS = [
    {id:"hub",ni:"🏠",nl:"Hub"},
    {id:"daily",ni:"📅",nl:"Daily"},
    {id:"weekly",ni:"📆",nl:"Weekly"},
    {id:"monthly",ni:"🗓",nl:"Month"},
    {id:"more",ni:"⋯",nl:"More"},
  ];

  const shared = {cur,setCur,dk,dayEvs,dayMls,dayPri,dayKids,setKidsLunch,wkDays,events,meals,setMeals,mealIdeas,setMealIdeas,monthNotes,setMonthNotes,quote,set,syncSet,syncPri,syncMeal,toggleEv,delEv,setAddSheet,cats,library,setLibrary,recurring,setRecurring};

  return (
    <div>
      {/* Top bar */}
      <div style={{background:"var(--mocha)",padding:"7px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:15,fontWeight:700}}>MY HUB 🌿</span>
        <span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>
          {DAYS[new Date(cur.y,cur.m,cur.d).getDay()].slice(0,3)}, {MONTHS[cur.m].slice(0,3)} {cur.d}
        </span>
      </div>

      {/* Content */}
      <div style={{padding:14,paddingBottom:90}} className="slide-up" key={view}>
        {view==="hub"    &&<HubView     {...shared}/>}
        {view==="daily"  &&<DailyView   {...shared}/>}
        {view==="weekly" &&<WeeklyView  {...shared}/>}
        {view==="monthly"&&<MonthlyView {...shared}/>}
        {view==="more"   &&<MoreView    {...shared} set={set} syncSet={syncSet} mealIdeas={mealIdeas} setMealIdeas={setMealIdeas} library={library} setLibrary={setLibrary} recurring={recurring} setRecurring={setRecurring} cats={cats}/>}
      </div>

      {/* Bottom nav */}
      <nav className="bottom-nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-item${view===t.id?" active":""}`} onClick={()=>setView(t.id)}>
            <span className="ni">{t.ni}</span>
            <span className="nl">{t.nl}</span>
          </button>
        ))}
      </nav>

      {/* Add item sheet - with Library + Recurring tabs */}
      {addSheet&&(
        <Sheet title="Add Item" onClose={()=>{setAddSheet(false);setShowLibrary(false);}}>
          {/* Tab switcher */}

// ── Auto-inject recurring items into today ─────────────────────────────
function getRecurringForDate(recurring, dateObj) {
  return (recurring||[]).filter(r => {
    if (!r.active) return false;
    const d = new Date(dateObj.y, dateObj.m, dateObj.d);
    if (r.freq === "Daily") return true;
    if (r.freq === "Weekly") return r.dow.includes(d.getDay());
    if (r.freq === "Monthly") return d.getDate() === (r.dom||1);
    if (r.freq === "Yearly") return d.getMonth() === (r.month||0) && d.getDate() === (r.dom||1);
    return false;
  });
}

                {evs.length?evs.map(e=><div key={e.id} style={{fontSize:12,color:"var(--textLt)",display:"flex",alignItems:"center",gap:5}}><span className="dot" style={{background:CAT_COLORS[e.type]||"#ccc",width:6,height:6}}/>{e.title}</div>):<div style={{fontSize:12,color:"var(--muted)"}}>—</div>}

              {isToday&&<span className="pill" style={{background:"rgba(139,175,141,.2)",color:"var(--sage)",fontSize:10}}>Today</span>}

      {/* CLEANING */}
      <div className="card">
        <SecTitle icon="🧹">CLEANING ZONE</SecTitle>

          <div style={{fontSize:13,color:"var(--textLt)"}}>Wipe counters + deep clean sink</div>
        </div>
        <div style={{fontSize:11,fontWeight:800,color:"var(--muted)",marginBottom:6}}>IF MORE ENERGY</div>
        {["Clean fridge","Organize pantry"].map((t,i)=><CheckItem key={i} label={t}/>)}
        <div style={{fontSize:11,fontWeight:800,color:"var(--muted)",margin:"10px 0 6px"}}>DELEGATE</div>
        {["Load dishwasher","Sweep floor"].map((t,i)=>(
          <CheckItem key={i} label={t} assignTo={i===0?"Yayra":"Seysey"}/>

      </div>

      {/* ROUTINES */}
      <div className="card">
        <SecTitle icon="🔄">ROUTINES & RESETS</SecTitle>
        <div className="two-col">
          {[["🌅 MORNING",["Hydrate 💧","Stretch","Plan my day","Top 3 priorities"]],
            ["🌙 EVENING",["Tidy up","Prep tomorrow","Gratitude","Wind down"]],
            ["☀️ AM RESET",["Brain dump","Check calendar","Top 3 tasks","Deep breath"]],
            ["🌛 PM RESET",["Review day","Plan tomorrow","Clear mind","Sleep mode"]]].map(([l,items])=>(
            <div key={l} style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:800,color:"var(--brownLt)",marginBottom:6}}>{l}</div>
              {items.map((t,i)=><CheckItem key={i} label={t}/>)}

          ))}

      </div>

      {/* PROGRESS */}
      <div className="card">
        <SecTitle icon="📊">WEEKLY PROGRESS</SecTitle>
        {Object.entries(set.weekly_progress||{}).map(([k,v])=>(

    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// DAILY VIEW
// ═══════════════════════════════════════════════════════════════════════
function DailyView({cur,setCur,dk,dayEvs,dayMls,dayPri,dayKids,setKidsLunch,set,syncPri,syncMeal,toggleEv,delEv,setAddSheet,cats}) {
  const dt=new Date(cur.y,cur.m,cur.d);
  const move=n=>{const d=new Date(dt);d.setDate(dt.getDate()+n);setCur({y:d.getFullYear(),m:d.getMonth(),d:d.getDate(),dow:d.getDay()});};
  const grouped={};cats.forEach(c=>grouped[c]=[]);
  dayEvs.forEach(e=>{if(grouped[e.type])grouped[e.type].push(e);});
  const canDelegate=dayEvs.filter(e=>e.assignTo==="Peter"||e.assignTo==="Both");

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Date nav */}
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button className="btn btn-brown btn-icon" onClick={()=>move(-1)}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"var(--brown)"}}>{DAYS[dt.getDay()]}</div>
          <div style={{fontSize:13,color:"var(--muted)"}}>{MONTHS[cur.m]} {cur.d}, {cur.y}</div>
        </div>
        <button className="btn btn-brown btn-icon" onClick={()=>move(1)}>›</button>
      </div>

      {/* ADHD rule */}
      <div style={{background:"rgba(139,175,141,.12)",borderRadius:12,padding:12,border:"1px solid rgba(139,175,141,.3)",display:"flex",gap:10}}>
        <span>🧩</span>
        <div style={{fontSize:13,color:"var(--textLt)",lineHeight:1.5}}><strong>{set.energy}:</strong> {ENERGY_RULES[set.energy]}</div>
      </div>

      {/* Priorities */}
      <div className="card">
        <SecTitle icon="⭐" right={<button className="btn btn-sage btn-sm" onClick={()=>setAddSheet(true)}>+ Add</button>}>PRIORITIES</SecTitle>
        <input className="inp" style={{background:"var(--beige)",fontWeight:700,marginBottom:10}} value={dayPri.main||""} onChange={e=>syncPri("main",e.target.value)} placeholder="Main priority…"/>
        {[0,1].map(i=><input key={i} className="inp inp-sm" style={{marginBottom:8}} value={(dayPri.medium||[])[i]||""} onChange={e=>{const m=[...(dayPri.medium||["",""])];m[i]=e.target.value;syncPri("medium",m);}} placeholder={`Medium ${i+1}…`}/>)}
        {[0,1,2].map(i=><input key={i} className="inp inp-sm" style={{marginBottom:i<2?8:0}} value={(dayPri.small||[])[i]||""} onChange={e=>{const s=[...(dayPri.small||["","",""])];s[i]=e.target.value;syncPri("small",s);}} placeholder={`Small ${i+1}…`}/>)}
      </div>

      {/* Time blocks */}
      <div className="card">
        <SecTitle icon="⏱">TIME BLOCKS</SecTitle>
        {HOURS.map(h=>{
          const isNow=h===new Date().getHours()&&dk===TK;
          const evs=dayEvs.filter(e=>getHour(e.timeStart)===h);
          return (
            <div key={h} className="trow" style={{background:isNow?"rgba(139,175,141,.1)":"transparent",borderRadius:6,minHeight:36}}>
              <span className="tlbl" style={{color:isNow?"var(--sage)":"var(--muted)",fontWeight:isNow?800:700}}>{fmt12(h)}</span>
              <div style={{flex:1}}>
                {evs.map(e=>(
                  <div key={e.id} style={{marginBottom:3,padding:"5px 10px",background:CAT_COLORS[e.type]+"22",borderLeft:`3px solid ${CAT_COLORS[e.type]||"var(--muted)"}`,borderRadius:"0 8px 8px 0"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:13,color:"var(--textLt)",flex:1,textDecoration:e.done?"line-through":"none"}}>{e.title}{e.timeEnd&&<span style={{fontSize:10,color:"var(--muted)"}}> – {e.timeEnd}</span>}</span>
                      <AssignBadge who={e.assignTo}/>
                      <input type="checkbox" checked={!!e.done} onChange={()=>toggleEv(dk,e.id)}/>
                      <button onClick={()=>delEv(dk,e.id)} style={{border:"none",background:"none",color:"var(--muted)",fontSize:15,cursor:"pointer"}}>×</button>
                    </div>
                    {e.note&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>📝 {e.note}</div>}
                    {e.link&&<div style={{fontSize:11,marginTop:2}}><a href={e.link} target="_blank" style={{color:"var(--sage)"}}>🔗 Link</a></div>}
                  </div>
                ))}
              </div>
              {isNow&&<span style={{fontSize:9,color:"var(--sage)",fontWeight:800}}>NOW</span>}
            </div>
          );
        })}
      </div>

      {/* Delegate */}
      {canDelegate.length>0&&(
        <div className="card" style={{background:"rgba(144,144,200,.08)",border:"1px solid rgba(144,144,200,.3)"}}>
          <SecTitle icon="🤝">PETER'S TASKS / DELEGATE</SecTitle>
          {canDelegate.map(e=>(
            <div key={e.id} style={{display:"flex",gap:8,alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--beige)"}}>
              <span>👉</span><span style={{flex:1,fontSize:13,color:"var(--textLt)"}}>{e.title}</span>
              <AssignBadge who={e.assignTo}/>
            </div>
          ))}
        </div>
      )}

      {/* Tasks */}
      <div className="card">
        <SecTitle icon="✅">TASKS</SecTitle>
        {cats.map(type=>{
          const items=grouped[type]||[];
          if(!items.length)return null;
          return (
            <div key={type} style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:800,color:CAT_COLORS[type]||"var(--muted)",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>
                <span className="dot" style={{background:CAT_COLORS[type]||"#ccc"}}/>{type.toUpperCase()}S
              </div>
              {items.map(e=><CheckItem key={e.id} label={e.title} done={e.done} time={e.timeStart} assignTo={e.assignTo} onChange={()=>toggleEv(dk,e.id)} onDelete={()=>delEv(dk,e.id)}/>)}
            </div>
          );
        })}
      </div>

      {/* Meals */}
      <div className="card">
        <SecTitle icon="🍽">MEALS</SecTitle>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:800,color:"var(--brownLt)",marginBottom:8}}>FAMILY</div>
          {[["breakfast","Breakfast"],["lunch","Lunch"],["dinner","Dinner"],["snack","Snack"]].map(([k,l])=>(
            <div key={k} style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:3}}>{l.toUpperCase()}</div>
              <input className="inp inp-sm" value={dayMls[k]||""} onChange={e=>syncMeal(k,e.target.value)} placeholder={`Add ${l.toLowerCase()}…`}/>
            </div>
          ))}
        </div>
        <div className="card-beige">
          <div style={{fontSize:11,fontWeight:800,color:"var(--brownLt)",marginBottom:8}}>👧 KIDS OPTIONS</div>
          {[["kidsBreakfast","Breakfast"],["kidsLunch","Lunch"],["kidsDinner","Dinner"]].map(([k,l])=>(
            <div key={k} style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:3}}>{l.toUpperCase()}</div>
              <input className="inp inp-sm" style={{background:"var(--white)"}} value={dayMls[k]||""} onChange={e=>syncMeal(k,e.target.value)} placeholder="Kids option…"/>
            </div>
          ))}
        </div>
      </div>

      {/* Kids lunch box */}
      <div className="card">
        <SecTitle icon="🎒">KIDS LUNCH BOX</SecTitle>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead><tr><th>Kid</th><th>Main</th><th>Fruit</th><th>Snack</th><th>Drink</th><th>Note</th></tr></thead>
            <tbody>
              {dayKids.map((kid,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:800,color:"var(--brown)"}}>{kid.name}</td>
                  {["main","fruit","snack","drink","note"].map(f=>(
                    <td key={f}><input value={kid[f]||""} onChange={e=>{
                      const updated=[...dayKids]; updated[i]={...updated[i],[f]:e.target.value};
                      setKidsLunch(k=>({...k,[dk]:updated}));
                    }} placeholder="…"/></td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// WEEKLY VIEW

function WeeklyView({cur,setCur,wkDays,events,meals,set,syncSet,setAddSheet,toggleEv,cats}) {

    <div style={{display:"flex",flexDirection:"column",gap:14}}>

            const isToday=k===TK;
            const count=(events[k]||[]).length;
            return (
              <div key={d.d} onClick={()=>setCur(d)} style={{textAlign:"center",padding:"8px 2px",borderRadius:10,cursor:"pointer",background:isToday?"var(--sage)":"transparent",border:`1px solid ${isToday?"var(--sage)":"var(--beige)"}`}}>
                <div style={{fontSize:10,fontWeight:800,color:isToday?"#fff":"var(--muted)"}}>{DAYS[d.dow].slice(0,1)}</div>

                {count>0&&<div style={{width:5,height:5,borderRadius:"50%",background:isToday?"#fff":"var(--sage)",margin:"3px auto 0"}}/>}

        {(set.weekly_goals||["","",""]).map((g,i)=>(
          <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:["var(--brown)","var(--sage)","var(--accent)"][i],display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff",flexShrink:0}}>{i+1}</div>

          </div>
        ))}
      </div>

      {/* Daily events for week */}
      {wkDays.map(d=>{
        const k=mkKey(d.y,d.m,d.d);
        const isToday=k===TK;

          <div key={k} className="card" style={{border:`1px solid ${isToday?"var(--sage)":"var(--beige)"}`}}>

      <div className="card">
        <SecTitle icon="🥗">WEEKLY MEAL PLAN</SecTitle>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead>
              <tr>
                <th style={{width:70}}>Day</th>
                <th>Breakfast</th>
                <th>Lunch</th>
                <th>Dinner</th>

                const k=mkKey(d.y,d.m,d.d);

                    <td>{m.dinner||<span style={{color:"var(--muted)",fontSize:11}}>—</span>}</td>

                <th>Day</th>

                const k=mkKey(d.y,d.m,d.d);

                    <td style={{fontWeight:700,color:"var(--brown)",whiteSpace:"nowrap"}}>{DAYS[d.dow].slice(0,3)} {d.d}</td>
                    <td>{m.kidsLunch||"Turkey wrap"}</td>
                    <td>{m.kidsLunch||"Pasta salad"}</td>

          </table>
        </div>
      </div>

      {/* Progress */}
      <div className="card">
        <SecTitle icon="📊">WEEKLY PROGRESS</SecTitle>
        {Object.entries(set.weekly_progress||{}).map(([k,v])=>(
          <div key={k} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
              <span style={{fontWeight:600}}>{k}</span><span style={{fontWeight:800,color:"var(--brownLt)"}}>{v}%</span>
            </div>
            <ProgBar value={v}/>
            <input type="range" min={0} max={100} value={v} onChange={e=>syncSet("weekly_progress",{...set.weekly_progress,[k]:parseInt(e.target.value)})} style={{marginTop:4}}/>
          </div>
        ))}
      </div>

      {/* Week reset */}
      <div className="card">
        <SecTitle icon="🔄">WEEK RESET</SecTitle>
        {["Review the week","Plan next week","Celebrate wins","Rest & recharge","Set new intentions"].map((t,i)=><CheckItem key={i} label={t}/>)}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// MONTHLY VIEW
// ═══════════════════════════════════════════════════════════════════════
function MonthlyView({cur,setCur,events,meals,setAddSheet,mealIdeas,monthNotes,setMonthNotes}) {
  const [vm,setVm]=useState({y:cur.y,m:cur.m});
  const dim=daysInMonth(vm.y,vm.m),fd=firstDow(vm.y,vm.m);
  const cells=Array.from({length:fd+dim},(_,i)=>i<fd?null:i-fd+1);
  while(cells.length%7!==0)cells.push(null);
  const selDk=mkKey(cur.y,cur.m,cur.d);
  const selEvs=events[selDk]||[];
  const mnKey=`${vm.y}-${vm.m}`;
  const mnote=monthNotes[mnKey]||{theme:"",priority1:"",priority2:"",priority3:"",notes:""};
  const setMnote=(f,v)=>setMonthNotes(n=>({...n,[mnKey]:{...mnote,[f]:v}}));
  const monthMealIdeas=mealIdeas.filter(m=>m.cat==="Dinner").slice(0,6);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button className="btn btn-brown btn-icon" onClick={()=>setVm(v=>v.m===0?{y:v.y-1,m:11}:{y:v.y,m:v.m-1})}>‹</button>
        <div style={{fontFamily:"'Playfair Display',serif",flex:1,textAlign:"center",fontSize:22,fontWeight:700,color:"var(--brown)"}}>{MONTHS[vm.m]} {vm.y}</div>
        <button className="btn btn-brown btn-icon" onClick={()=>setVm(v=>v.m===11?{y:v.y+1,m:0}:{y:v.y,m:v.m+1})}>›</button>
      </div>

      {/* Calendar */}
      <div className="card" style={{padding:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:800,color:"var(--muted)"}}>{d.slice(0,2).toUpperCase()}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((day,i)=>{
            if(!day)return <div key={i}/>;
            const k=mkKey(vm.y,vm.m,day);
            const evs=events[k]||[];
            const isToday=day===T.d&&vm.m===T.m&&vm.y===T.y;
            const isSel=k===selDk&&vm.m===cur.m&&vm.y===cur.y;
            const hasMeal=!!(meals[k]||{}).dinner;
            return (
              <div key={i} onClick={()=>setCur({y:vm.y,m:vm.m,d:day,dow:new Date(vm.y,vm.m,day).getDay()})}
                style={{minHeight:58,padding:4,borderRadius:10,cursor:"pointer",background:isSel?"rgba(139,175,141,.3)":isToday?"rgba(201,168,124,.2)":"var(--white)",border:`1px solid ${isSel?"var(--sage)":isToday?"var(--accent)":"var(--beige)"}`,transition:"all .15s"}}>
                <div style={{fontSize:13,fontWeight:800,color:isToday?"var(--brown)":"var(--textLt)",marginBottom:2}}>{day}</div>
                {evs.slice(0,2).map(e=><div key={e.id} style={{fontSize:8,color:CAT_COLORS[e.type]||"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:1}}>● {e.title}</div>)}
                {evs.length>2&&<div style={{fontSize:8,color:"var(--muted)"}}>+{evs.length-2}</div>}
                {hasMeal&&<div style={{fontSize:8,color:"var(--accent)"}}>🍽</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Month theme & priorities */}
      <div className="card">
        <SecTitle icon="🌟">MONTH THEME & PRIORITIES</SecTitle>
        <input className="inp inp-sm" style={{marginBottom:10,fontStyle:"italic",background:"var(--beige)"}} value={mnote.theme} onChange={e=>setMnote("theme",e.target.value)} placeholder="This month's theme…"/>
        {["priority1","priority2","priority3"].map((f,i)=>(
          <div key={f} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:"var(--brown)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0}}>{i+1}</div>
            <input className="inp inp-sm" value={mnote[f]} onChange={e=>setMnote(f,e.target.value)} placeholder={`Priority ${i+1}…`}/>
          </div>
        ))}
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:5}}>NOTES / FOCUS</div>
          <textarea className="inp" placeholder="Month notes, focus areas…" value={mnote.notes} onChange={e=>setMnote("notes",e.target.value)} rows={3}/>
        </div>
      </div>

      {/* Selected day */}
      <div className="card">
        <SecTitle right={<button className="btn btn-sage btn-sm" onClick={()=>setAddSheet(true)}>+ Add</button>}>
          <span style={{color:"var(--brown)"}}>{DAYS[cur.dow]}, {MONTHS[cur.m].slice(0,3)} {cur.d}</span>
        </SecTitle>
        {selEvs.length?selEvs.map(e=>(
          <div key={e.id} style={{display:"flex",gap:8,alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--beige)",fontSize:13,color:"var(--textLt)"}}>
            <span className="dot" style={{background:CAT_COLORS[e.type]||"#ccc"}}/>
            <span style={{flex:1}}>{e.title}</span>
            {e.timeStart&&<span style={{fontSize:11,color:"var(--muted)"}}>{e.timeStart}</span>}
            <AssignBadge who={e.assignTo}/>
          </div>
        )):<div style={{fontSize:13,color:"var(--muted)",textAlign:"center",padding:12}}>Nothing on this day. Tap + to add!</div>}
      </div>

      {/* Month meal ideas */}
      <div className="card">
        <SecTitle icon="🍽">MEAL IDEAS THIS MONTH</SecTitle>
        <div className="two-col">
          {monthMealIdeas.map(m=>(
            <div key={m.id} style={{padding:10,background:"var(--beige)",borderRadius:10}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--brown)"}}>{m.name}</div>
              <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>⏱ {m.prep}</div>
              <div style={{marginTop:4,display:"flex",gap:3,flexWrap:"wrap"}}>
                {(m.tags||"").split(",").filter(Boolean).map(t=>(
                  <span key={t} style={{background:"rgba(139,175,141,.2)",color:"var(--sageDk)",borderRadius:10,padding:"1px 6px",fontSize:9,fontWeight:700}}>{t.trim()}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// MORE VIEW
// ═══════════════════════════════════════════════════════════════════════
function MoreView({cur,setCur,events,set,syncSet,mealIdeas,setMealIdeas,library,setLibrary,recurring,setRecurring,cats}) {
  const [tab,setTab]=useState("yearly");
  const months=[];
  for(let i=0;i<12;i++){let m=5+i,y=2026;if(m>11){m-=12;y++;}months.push({y,m});}
  const [newMeal,setNewMeal]=useState({name:"",cat:"Dinner",prep:"",tags:""});
  const [newCat,setNewCat]=useState("");

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Sub tabs */}
      <div style={{display:"flex",gap:6,background:"var(--beige)",borderRadius:14,padding:4}}>
        {[["yearly","🌿 Yearly"],["meals","🍽 Meals"],["settings","⚙️ Settings"]].map(([id,l])=>(
          <button key={id} className="btn" style={{flex:1,padding:"9px 6px",fontSize:12,background:tab===id?"var(--white)":"transparent",color:tab===id?"var(--brown)":"var(--muted)",boxShadow:tab===id?"0 2px 8px rgba(0,0,0,.07)":"none",borderRadius:10}} onClick={()=>setTab(id)}>{l}</button>
        ))}
      </div>

      {/* YEARLY */}
      {tab==="yearly"&&(
        <>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"var(--brown)"}}>Year at a Glance · Jun 2026 – May 2027</div>
          <div className="two-col">
            {months.map(({y,m})=>{
              const dim=daysInMonth(y,m),fd=firstDow(y,m);
              const cells=Array.from({length:fd+dim},(_,i)=>i<fd?null:i-fd+1);
              while(cells.length%7!==0)cells.push(null);
              return (
                <div key={`${y}-${m}`} className="card" style={{padding:10}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:"var(--brown)",marginBottom:7}}>{MONTHS[m].slice(0,3)} {y}</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,marginBottom:2}}>
                    {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{fontSize:8,fontWeight:800,color:"var(--muted)",textAlign:"center"}}>{d}</div>)}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
                    {cells.map((day,i)=>{
                      if(!day)return <div key={i}/>;
                      const k=mkKey(y,m,day);
                      const has=(events[k]||[]).length>0;
                      const isToday=day===T.d&&m===T.m&&y===T.y;
                      const isSel=day===cur.d&&m===cur.m&&y===cur.y;
                      return <div key={i} onClick={()=>setCur({y,m,d:day,dow:new Date(y,m,day).getDay()})} style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,cursor:"pointer",borderRadius:3,background:isSel?"var(--sage)":isToday?"rgba(201,168,124,.4)":has?"var(--beige)":"transparent",color:isSel?"#fff":isToday?"var(--brown)":"var(--textLt)",fontWeight:isToday||isSel?800:400}}>{day}</div>;
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* MEALS DB */}
      {tab==="meals"&&(
        <>
          {["Breakfast","Lunch","Dinner","Snack"].map(cat=>{
            const catM=mealIdeas.filter(m=>m.cat===cat);
            if(!catM.length)return null;
            return (
              <div key={cat} className="card">
                <SecTitle>{cat}</SecTitle>
                {catM.map(m=>(
                  <div key={m.id} style={{padding:"9px 0",borderBottom:"1px solid var(--beige)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"var(--brown)"}}>{m.name}</div>
                      <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>⏱ {m.prep} · {m.tags}</div>
                    </div>
                    <button onClick={()=>setMealIdeas(mi=>mi.filter(x=>x.id!==m.id))} style={{border:"none",background:"none",color:"var(--muted)",fontSize:16,cursor:"pointer"}}>×</button>
                  </div>
                ))}
              </div>
            );
          })}
          <div className="card">
            <SecTitle icon="✚">ADD MEAL IDEA</SecTitle>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <input className="inp" placeholder="Meal name…" value={newMeal.name} onChange={e=>setNewMeal(n=>({...n,name:e.target.value}))}/>
              <select className="sel" value={newMeal.cat} onChange={e=>setNewMeal(n=>({...n,cat:e.target.value}))}>
                {["Breakfast","Lunch","Dinner","Snack"].map(c=><option key={c}>{c}</option>)}
              </select>
              <div style={{display:"flex",gap:8}}>
                <input className="inp inp-sm" placeholder="Prep time…" value={newMeal.prep} onChange={e=>setNewMeal(n=>({...n,prep:e.target.value}))} style={{flex:1}}/>
                <input className="inp inp-sm" placeholder="Tags…" value={newMeal.tags} onChange={e=>setNewMeal(n=>({...n,tags:e.target.value}))} style={{flex:1}}/>
              </div>
              <button className="btn btn-sage" onClick={()=>{if(newMeal.name.trim()){setMealIdeas(m=>[...m,{...newMeal,id:Date.now()}]);setNewMeal({name:"",cat:"Dinner",prep:"",tags:""});}}}>Add Meal</button>
            </div>
          </div>
        </>
      )}

      {/* SETTINGS */}
      {tab==="settings"&&(
        <>
          <div className="card">
            <SecTitle icon="⚡">ENERGY & MOOD</SecTitle>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:5}}>ENERGY LEVEL</div>
              <select className="sel" value={set.energy} onChange={e=>syncSet("energy",e.target.value)}>
                {Object.keys(ENERGY_RULES).map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:5}}>MOOD</div>
              <select className="sel" value={set.mood} onChange={e=>syncSet("mood",e.target.value)}>
                {["😊 Great","😐 Okay","😔 Low","😤 Stressed","😴 Tired"].map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>

          <div className="card">
            <SecTitle icon="🏷">CATEGORIES</SecTitle>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {(set.categories||DEFAULT_CATS).map(c=>(
                <span key={c} style={{background:CAT_COLORS[c]+"22",color:CAT_COLORS[c]||"var(--muted)",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
                  {c}
                  {!DEFAULT_CATS.includes(c)&&<button onClick={()=>syncSet("categories",(set.categories||[]).filter(x=>x!==c))} style={{border:"none",background:"none",color:"var(--muted)",fontSize:13,cursor:"pointer",padding:0}}>×</button>}
                </span>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input className="inp inp-sm" placeholder="New category name…" value={newCat} onChange={e=>setNewCat(e.target.value)} style={{flex:1}}/>
              <button className="btn btn-sage btn-sm" onClick={()=>{if(newCat.trim()){syncSet("categories",[...(set.categories||DEFAULT_CATS),newCat]);setNewCat("");}}}>Add</button>
            </div>
          </div>

          <div className="card">
            <SecTitle icon="📊">WEEKLY PROGRESS</SecTitle>
            {Object.entries(set.weekly_progress||{}).map(([k,v])=>(
              <div key={k} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:700}}>{k}</span><span style={{fontWeight:800,color:"var(--brownLt)"}}>{v}%</span>
                </div>
                <input type="range" min={0} max={100} value={v} onChange={e=>syncSet("weekly_progress",{...set.weekly_progress,[k]:parseInt(e.target.value)})}/>
              </div>
            ))}
          </div>

          <div className="card" style={{background:"var(--warm)",border:"1px solid var(--sand)"}}>
            <SecTitle icon="👤">ASSIGNED TO</SecTitle>
            <div style={{fontSize:13,color:"var(--textLt)",lineHeight:1.8}}>
              <div>When adding tasks, assign to:</div>
              <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
                <AssignBadge who="Jocelyne"/>
                <AssignBadge who="Peter"/>
                <AssignBadge who="Both"/>
              </div>
              <div style={{marginTop:8,fontSize:12,color:"var(--muted)"}}>Tasks assigned to Peter appear in the Delegate section on Daily view.</div>
            </div>
          </div>

          <div className="card">
            <SecTitle icon="📚">ITEM LIBRARY</SecTitle>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>Your saved quick-add items. Tap × to remove.</div>
            {(library||[]).map(item=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid var(--beige)"}}>
                <span className="dot" style={{background:CAT_COLORS[item.type]||"#ccc",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{item.title}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{item.type} · {item.tag} · {item.assignTo}</div>
                </div>
                <button onClick={()=>setLibrary(l=>l.filter(x=>x.id!==item.id))} style={{border:"none",background:"none",color:"var(--muted)",fontSize:16,cursor:"pointer"}}>×</button>
              </div>
            ))}
            {!(library||[]).length&&<div style={{fontSize:13,color:"var(--muted)"}}>No items yet. Add items and tap "Add & Save to Library"!</div>}
          </div>

          <div className="card">
            <SecTitle icon="🔁">RECURRING ITEMS</SecTitle>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>Toggle on/off or delete recurring items.</div>
            {(recurring||[]).map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid var(--beige)"}}>
                <input type="checkbox" checked={!!r.active} onChange={()=>setRecurring(rc=>rc.map(x=>x.id===r.id?{...x,active:!x.active}:x))}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)",opacity:r.active?1:.5}}>{r.title}</div>
                  <div style={{fontSize:11,color:"var(--sage)",fontWeight:700}}>🔁 {r.freq}{r.freq==="Weekly"&&r.dow.length>0?" ("+r.dow.map(d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d]).join(",")+")":" "} · {r.type}</div>
                </div>
                <button onClick={()=>setRecurring(rc=>rc.filter(x=>x.id!==r.id))} style={{border:"none",background:"none",color:"var(--muted)",fontSize:16,cursor:"pointer"}}>×</button>
              </div>
            ))}
            {!(recurring||[]).length&&<div style={{fontSize:13,color:"var(--muted)"}}>No recurring items yet. Add them via + Add Item → Recurring tab!</div>}
          </div>
        </>
      )}
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));
</script>
</body>
</html>
